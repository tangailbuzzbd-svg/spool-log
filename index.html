<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Spool App Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .app-container {
            max-width: 500px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #f8fafc;
        }
        .custom-scroll::-webkit-scrollbar {
            display: none;
        }
        .active-tab {
            color: #2563eb;
            border-top: 2px solid #2563eb;
        }
        input:focus {
            outline: none;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .item-card {
            animation: slideIn 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100">

    <div class="app-container shadow-2xl">
        <header class="bg-blue-700 text-white p-4 pt-6 pb-8 rounded-b-[2rem] shadow-lg">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <p class="text-blue-100 text-xs font-semibold uppercase tracking-widest">AREA: CS. 23</p>
                    <h1 class="text-xl font-bold">Production Log</h1>
                </div>
                <div class="bg-blue-600/50 px-3 py-1 rounded-full border border-blue-400/30">
                    <span class="text-[10px] font-bold">NEW . SPOOL</span>
                </div>
            </div>
            
            <div class="space-y-3">
                <div class="relative">
                    <input type="text" id="searchInput" 
                           placeholder="Search EB or Spool..." 
                           class="w-full bg-white/10 border border-white/20 rounded-xl py-3 pl-10 pr-4 text-white placeholder-white/60 focus:bg-white focus:text-gray-900 transition-all">
                    <div class="absolute left-3 top-3.5">
                        <svg class="h-5 w-5 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                </div>
                
                <div class="flex gap-2">
                    <div class="relative flex-grow">
                        <input type="date" id="dateInput" 
                               class="w-full bg-white/10 border border-white/20 rounded-xl py-2 px-4 text-white text-sm focus:bg-white focus:text-gray-900 transition-all">
                    </div>
                    <button id="clearDate" class="bg-white/10 hover:bg-white/20 p-2 rounded-xl border border-white/20 transition-all">
                        <svg class="h-5 w-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
            </div>
        </header>

        <main class="flex-grow overflow-y-auto custom-scroll p-4 space-y-3" id="listView">
            <!-- Cards will be injected here -->
        </main>

        <nav class="bg-white border-t border-gray-200 grid grid-cols-3 h-16">
            <button class="flex flex-col items-center justify-center active-tab">
                <svg class="h-6 w-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
                <span class="text-[10px] mt-1 font-bold">HOME</span>
            </button>
            <button class="flex flex-col items-center justify-center text-gray-400">
                <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                <span class="text-[10px] mt-1 font-bold">STATS</span>
            </button>
            <button class="flex flex-col items-center justify-center text-gray-400">
                <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                <span class="text-[10px] mt-1 font-bold">SETTINGS</span>
            </button>
        </nav>
    </div>

    <script>
        const data = [
            { date: "2026-05-16", eb: "128357", spl: "001" }, { date: "2026-05-16", eb: "128291", spl: "002" },
            { date: "2026-05-16", eb: "128335", spl: "002" }, { date: "2026-05-16", eb: "285511", spl: "005" },
            { date: "2026-05-16", eb: "128395", spl: "003" }, { date: "2026-05-16", eb: "120727", spl: "002" },
            { date: "2026-05-16", eb: "285517", spl: "005" }, { date: "2026-05-16", eb: "128388", spl: "004" },
            { date: "2026-05-16", eb: "108579", spl: "001" }, { date: "2026-05-16", eb: "128410", spl: "003" },
            { date: "2026-05-16", eb: "285678", spl: "007" }, { date: "2026-05-16", eb: "128412", spl: "003" },
            { date: "2026-05-16", eb: "290567", spl: "006" }, { date: "2026-05-16", eb: "128367", spl: "005" },
            { date: "2026-05-16", eb: "128344", spl: "001" }, { date: "2026-05-16", eb: "285688", spl: "003" },
            { date: "2026-05-16", eb: "128346", spl: "002" }, { date: "2026-05-16", eb: "125259", spl: "003" },
            { date: "2026-05-16", eb: "128279", spl: "001" }, { date: "2026-05-16", eb: "290488", spl: "002" },
            { date: "2026-05-16", eb: "128000", spl: "002" }, { date: "2026-05-16", eb: "285756", spl: "002" },
            { date: "2026-05-16", eb: "128331", spl: "001" }, { date: "2026-05-16", eb: "128371", spl: "003" },
            { date: "2026-05-16", eb: "285510", spl: "001" }, { date: "2026-05-16", eb: "285512", spl: "005" },
            { date: "2026-05-16", eb: "285692", spl: "005" }, { date: "2026-05-16", eb: "285516", spl: "005" },
            { date: "2026-05-16", eb: "127775", spl: "002" }, { date: "2026-05-16", eb: "127552", spl: "006" },
            { date: "2026-05-16", eb: "287501", spl: "001" }, { date: "2026-05-16", eb: "125322", spl: "002" }
        ];

        const listView = document.getElementById('listView');
        const searchInput = document.getElementById('searchInput');
        const dateInput = document.getElementById('dateInput');
        const clearDate = document.getElementById('clearDate');

        function renderList() {
            const searchText = searchInput.value.toLowerCase();
            const selectedDate = dateInput.value;

            const filteredData = data.filter(item => {
                const matchesSearch = item.eb.toLowerCase().includes(searchText) || 
                                     item.spl.toLowerCase().includes(searchText);
                const matchesDate = selectedDate === "" || item.date === selectedDate;
                return matchesSearch && matchesDate;
            });

            if(filteredData.length === 0) {
                listView.innerHTML = `
                    <div class="text-center py-20">
                        <div class="bg-gray-200 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                            <svg class="h-8 w-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        </div>
                        <p class="text-gray-500 font-medium">No records found</p>
                    </div>
                `;
                return;
            }

            listView.innerHTML = filteredData.map(item => `
                <div class="item-card bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center active:scale-[0.98] transition-transform">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-blue-50 rounded-xl flex items-center justify-center">
                            <span class="text-blue-600 font-bold text-lg">${item.spl.slice(-2)}</span>
                        </div>
                        <div>
                            <p class="text-xs text-gray-400 font-semibold uppercase tracking-tighter">EB NUMBER</p>
                            <p class="text-gray-800 font-bold text-lg leading-tight">${item.eb}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">Spool ID</p>
                        <span class="bg-gray-800 text-white text-[10px] px-2.5 py-1 rounded-lg font-black tracking-widest">
                            SPL:${item.spl}
                        </span>
                        <p class="text-[10px] text-blue-500 mt-2 font-medium">${item.date}</p>
                    </div>
                </div>
            `).join('');
        }

        searchInput.addEventListener('input', renderList);
        dateInput.addEventListener('change', renderList);
        
        clearDate.addEventListener('click', () => {
            dateInput.value = "";
            renderList();
            // Provide a small haptic feel by changing color briefly
            clearDate.classList.add('bg-red-500');
            setTimeout(() => clearDate.classList.remove('bg-red-500'), 200);
        });

        // Initial render
        window.onload = () => renderList();

    </script>
</body>
</html>
